  <!-- Show login overlay IMMEDIATELY — skip if rememberMe session valid -->
  <script>
    (function() {
      // Check if valid rememberMe session exists
      const hasRememberMe = (() => {
        try {
          const s = JSON.parse(localStorage.getItem('wt_session_v1'));
          if (!s || !s.rememberMe) return false;
          if (Date.now() - s.savedAt > 30 * 24 * 60 * 60 * 1000) return false;
          return true;
        } catch { return false; }
      })();

      // Survey not done yet → let survey.js show first, no spinner needed
      const surveyDone = localStorage.getItem('wt_survey_done') === 'true';

      if (!hasRememberMe && surveyDone) {
        // Returning user who did survey — show login spinner while JS loads
        const overlay = document.createElement('div');
        overlay.id = 'loginOverlay';
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#E8F0FE,#D2E3FC 50%,#C5E1F5);display:flex;align-items:center;justify-content:center;padding:16px;';
        overlay.innerHTML = '<div style="background:#fff;border-radius:28px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(26,115,232,.18);text-align:center;"><div style="font-size:52px;">💧</div><div style="font-family:Google Sans,sans-serif;font-size:22px;font-weight:700;color:#202124;margin:8px 0 4px;">Water Tracker</div><div style="font-size:13px;color:#5F6368;margin-bottom:20px;">Signing you in...</div><div style="width:40px;height:40px;border:4px solid #D2E3FC;border-top-color:#1A73E8;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto;"></div></div>';
        document.body.appendChild(overlay);
      }
      // If surveyDone is false → no spinner, survey.js will show its own overlay
    })();
  </script>

  <!-- Dark Mode Script -->
  <script>
    (function() {
      // Apply saved dark mode immediately to avoid flash
      const savedDark = localStorage.getItem('wt_dark_mode');
      // APP-2 fix: fall back to system preference on first visit
      const prefersDark = savedDark === null
        ? window.matchMedia('(prefers-color-scheme: dark)').matches
        : savedDark === 'true';
      if (prefersDark) document.body.classList.add('dark-mode');
    })();
  </script>

  <!-- Install banner -->
  <div id="installBanner" style="display:none;position:fixed;bottom:80px;left:16px;right:16px;background:#fff;border-radius:20px;padding:16px 20px;box-shadow:0 4px 24px rgba(0,0,0,0.15);z-index:300;align-items:center;gap:12px;">

      <div style="font-size:12px;color:#5F6368;margin-top:2px;">Add to home screen for quick access</div>
    </div>
    <button id="installBtn" style="background:#1A73E8;color:#fff;border:none;border-radius:99px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;">Install</button>
    <button id="dismissBanner" style="background:none;border:none;font-size:20px;cursor:pointer;color:#5F6368;padding:0 4px;">✕</button>
  </div>
  <script>
    let deferredPrompt;
    const banner = document.getElementById('installBanner');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferredPrompt = e; banner.style.display = 'flex';
    });
    document.getElementById('installBtn')?.addEventListener('click', async () => {
      banner.style.display = 'none';
      if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
    });
    document.getElementById('dismissBanner')?.addEventListener('click', () => {
      banner.style.display = 'none';
    });
  </script>
